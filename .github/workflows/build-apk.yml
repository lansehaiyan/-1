name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        id: build
        continue-on-error: true
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Report error
        if: steps.build.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/gradle.log', 'utf8');
            const lines = log.split('\n');
            const last200 = lines.slice(-200).join('\n');
            const errors = lines.filter(l => 
              /error|FAILED|Exception|Cause|Cannot|not found/i.test(l)
            ).slice(0, 30).join('\n');
            console.log('=== Last 200 lines ===');
            console.log(last200);
            console.log('=== Key errors ===');
            console.log(errors || '(none found)');
            core.setFailed('Gradle build failed');

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PhoneTimeManager-APK
          path: "**/*.apk"
