name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build Debug APK
        run: |
          echo "## Build Output" >> $GITHUB_STEP_SUMMARY
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log | tail -200 >> $GITHUB_STEP_SUMMARY
          exitcode=${PIPESTATUS[0]}
          echo "Exit code: $exitcode"
          echo "**Exit code: $exitcode**" >> $GITHUB_STEP_SUMMARY
          if [ $exitcode -ne 0 ]; then
            grep -i "error\|FAILED\|Exception\|not found\|Missing\|Could not" /tmp/build.log | head -30 >> $GITHUB_STEP_SUMMARY
            exit $exitcode
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PhoneTimeManager-APK
          path: "**/*.apk"
