name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build Debug APK
        run: |
          set -o pipefail
          gradle assembleDebug --no-daemon --scan 2>&1 | tee /tmp/gradle.log

      - name: Print errors
        if: failure()
        run: |
          echo "=== GRADLE BUILD FAILED ==="
          echo "=== Last 100 lines ==="
          tail -100 /tmp/gradle.log
          echo "=== Errors found ==="
          grep -i -E "error|FAILED|Exception|Cause|not found" /tmp/gradle.log | head -30 || echo "(none found)"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PhoneTimeManager-APK
          path: "**/*.apk"
