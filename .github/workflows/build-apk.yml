name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build Debug APK
        id: build
        run: |
          set -o pipefail
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle.log
          echo "exitcode=$?" >> $GITHUB_OUTPUT

      - name: Show errors in summary
        if: always()
        run: |
          echo "## Build Log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -200 /tmp/gradle.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Gradle Error Summary" >> $GITHUB_STEP_SUMMARY
          grep -i -E "error|FAILED|Exception|Cause|Cannot|not found" /tmp/gradle.log | head -20 >> $GITHUB_STEP_SUMMARY

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PhoneTimeManager-APK
          path: "**/*.apk"
