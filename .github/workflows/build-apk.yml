name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq android-sdk 2>/dev/null || true
          # Download cmdline-tools
          mkdir -p $HOME/android/cmdline-tools
          curl -sSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $HOME/android/cmdline-tools/
          mv $HOME/android/cmdline-tools/cmdline-tools $HOME/android/cmdline-tools/latest
          rm cmdline-tools.zip
          # Accept licenses and install platform
          yes | $HOME/android/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1
          yes | $HOME/android/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1
          echo "ANDROID_HOME=$HOME/android" >> $GITHUB_ENV
          echo "$HOME/android/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhoneTimeManager-APK
          path: app/build/outputs/apk/debug/*.apk
