name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Debug - check SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms"
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5
          cache-read-only: false

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log | tail -100

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PhoneTimeManager-APK
          path: app/build/outputs/apk/debug/*.apk
